[profile.default]
src       = "contracts"
out       = "out"
libs      = ["lib"]
test      = "test"
cache_path = "cache"
solc      = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs   = 256
depth  = 15

[profile.ci]
fuzz    = { runs = 5000 }
